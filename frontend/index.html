<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Budget Tracker</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #1f2937;
        }
        .card {
            width: min(560px, calc(100vw - 32px));
            background: rgba(255,255,255,0.96);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.18);
            text-align: center;
        }
        a.button {
            display: inline-block;
            margin-top: 20px;
            padding: 14px 28px;
            border-radius: 999px;
            text-decoration: none;
            color: white;
            background: linear-gradient(45deg, #667eea, #764ba2);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>SMS Budget Tracker</h1>
        <p>Upload SMS exports, classify transactions, and track your budget with analytics and webhook ingestion.</p>
        <a class="button" href="http://localhost:8501">Launch Streamlit App</a>
    </div>
</body>
</html>
