<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Budget Tracker</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #0f172a;
            color: #f8fafc;
        }
        .hero {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 32px;
            background: radial-gradient(circle at top, #334155, #0f172a 55%);
        }
        .panel {
            max-width: 760px;
            text-align: center;
        }
        .actions a {
            display: inline-block;
            margin: 10px;
            padding: 14px 26px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 600;
        }
        .primary { background: #22c55e; color: #052e16; }
        .secondary { background: #1e293b; color: #f8fafc; border: 1px solid #475569; }
    </style>
</head>
<body>
    <section class="hero">
        <div class="panel">
            <h1>Financial tracking from SMS, ready for webhooks</h1>
            <p>This project now has a structured backend, ML categorization, prediction utilities, and a FastAPI webhook for real-time ingestion.</p>
            <div class="actions">
                <a class="primary" href="http://localhost:8501">Open App</a>
                <a class="secondary" href="/">PWA Home</a>
            </div>
        </div>
    </section>
</body>
</html>
